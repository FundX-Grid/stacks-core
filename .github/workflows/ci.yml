name: CI
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1,3,5'  # runs Mon/Wed/Fri at 9am

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies including own SDK
        run: |
          npm install @jadonamite/stacks-core
          npm install @jadonamite/chessify-sdk
          npm install @jadonamite/fundxagon-sdk
      - name: Run tests
        run: npm test
