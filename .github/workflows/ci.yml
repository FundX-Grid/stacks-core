name: CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install SDKs from npmjs.com
        run: |
          npm install @jadonamite/stacks-core
          npm install @jadonamite/chessify-sdk
          npm install @jadonamite/fundxagon-sdk

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present
